<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body, html {
      height: 100%;
      margin: 0;
    }
    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .filter {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
    }
    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      /* Your loader styles here */
    }
    #google-form-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      height: 80%;
      max-width: 800px; /* Adjust maximum width as needed */
      max-height: 600px; /* Adjust maximum height as needed */
      z-index: 1;
    }
    #google-form-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
  <link href="https://meyerweb.com/eric/tools/css/reset/reset.css" rel="stylesheet" />
  <link href="./style.css" rel="stylesheet" />
  <title>Jadetonic</title>
</head>
<body>
  <div class="container">
    <div class="filter"></div>
    <div class="loader"></div>
    <!-- Google Form iframe -->
    <div id="google-form-container">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc4G-ZjlPltON6ytTBh-cp2oMnLxfyXrX8uFDfVBNsFxLRkNw/viewform" frameborder="0" allowfullscreen></iframe>
    </div>
    <!-- End of Google Form iframe -->
  </div>
  <script src="./script.js"></script>
</body>
</html>
