<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body, html {
      height: 100%;
      margin: 0;
    }
    #google-form-container {
      margin: 10% auto; /* Center the container vertically and horizontally */
    }
    #google-form-container iframe {
      width: 90%; /* Adjusted width for smaller screens */
      max-width: 800px; /* Maximum width for larger screens */
      height: auto; /* Allow the iframe to adjust its height based on content */
      border: none;
    }
    .loader {
      /* Your loader styles here */
    }

    /* Media Query for desktop */
    @media screen and (min-width: 1024px) {
      #google-form-container iframe {
        width: 70%; /* Adjusted width for larger desktop screens */
      }
    }
  </style>
  <link href="https://meyerweb.com/eric/tools/css/reset/reset.css" rel="stylesheet" />
  <link href="./style.css" rel="stylesheet" />
  <title>Jadetonic</title>
</head>
<body>
  <!-- Loader -->
  <div class="loader"></div>
  <!-- Google Form iframe -->
  <div id="google-form-container">
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc4G-ZjlPltON6ytTBh-cp2oMnLxfyXrX8uFDfVBNsFxLRkNw/viewform" frameborder="0" allowfullscreen scrolling="no"></iframe>
  </div>
  <!-- End of Google Form iframe -->
  <script src="./script.js"></script>
</body>
</html>
