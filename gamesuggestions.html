<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smooth Transition to Embedded Google Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Loader -->
    <div class="loader"></div>

    <!-- Background Image with Blur -->
    <div class="blur-background"></div>

    <!-- Embedded Google Form Container -->
    <div id="google-form-container">
        <!-- Paste your Google Form embed code here -->
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc4G-ZjlPltON6ytTBh-cp2oMnLxfyXrX8uFDfVBNsFxLRkNw/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
