<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body, html {
      height: 100%;
      margin: 0;
    }
    #google-form-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1; /* Ensure the Google Form is behind the loader */
    }
    #google-form-container iframe {
      width: 640px; /* Set the width of the Google Form */
      height: 1250px; /* Adjust the height to display the entire Google Form without scrolling */
      border: none;
      overflow: hidden; /* Hide any potential scrollbars */
    }
    .loader {
      position: fixed;
      top: calc(50% - 20px); /* Adjust loader position */
      left: calc(50% - 20px); /* Adjust loader position */
      z-index: 9999; /* Ensure the loader stays on top */
      width: 40px; /* Adjust loader size as needed */
      height: 40px;
      border: 4px solid #f3f3f3; /* Loader border color */
      border-top: 4px solid #3498db; /* Loader top border color */
      border-radius: 50%; /* Make the loader round */
      animation: spin 1s linear infinite; /* Loader animation */
    }

    /* Loader animation */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Media Query for iPhone */
    @media only screen and (max-width: 767px) {
      #google-form-container iframe {
        width: calc(100vw - 20px); /* Adjust width to fit within screen width with some margin */
        height: calc(100vh - 20px); /* Adjust height to fill the available space */
      }
    }
  </style>
  <link href="https://meyerweb.com/eric/tools/css/reset/reset.css" rel="stylesheet" />
  <link href="./style.css" rel="stylesheet" />
  <title>Jadetonic</title>
</head>
<body>
  <div class="filter"></div>
  <!-- Loader -->
  <div class="loader"></div>
  <!-- Google Form iframe -->
  <div id="google-form-container">
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc4G-ZjlPltON6ytTBh-cp2oMnLxfyXrX8uFDfVBNsFxLRkNw/viewform" frameborder="0" allowfullscreen></iframe>
  </div>
  <!-- End of Google Form iframe -->
  <script src="./script.js"></script>
</body>
</html>
